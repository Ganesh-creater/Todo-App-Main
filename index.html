<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Todo app</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Tinos:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="background-todo">
      <div class="header">
        <h1>TODO</h1>
        <img
          src="./images/icon-sun.svg"
          alt="sun-icon"
          width="30px"
          height="30px"
        />
      </div>
    </div>
    <div class="todo-app">
      <div class="input-box">
        <button class="icon-btn">
          <i class="fa-thin fa-circle" style="color: rgb(97, 93, 93)"></i>
        </button>
        <input class="input" type="text" placeholder="Create a new todo..." />
      </div>
      <div class="list-container">
        <ul>
          <li></li>
        </ul>
      </div>
    </div>
    <!-- <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </footer> -->
  </body>
</html>
